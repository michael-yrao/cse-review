beyond_leetcode: >
  For topics with thin LeetCode coverage (persistent structures, treaps, heavy
  flow), move to Codeforces (Div. 2 C–E), AtCoder (ABC/ARC), or USACO. The tracker
  still owns spaced repetition regardless of source.
