# Competitive-style application backlog — a PULL POOL, not a checklist.
# Pull from it AFTER knowledge expansion (Tier 2 / competitive), gated by the
# Tier-2 technique each problem exercises. Near-zero interview payoff; this is
# competitive-programming growth. Log each pull in dsa_progress.md.
pillar: dsa
kind: application_backlog
phase: expansion_tier2
groups:
