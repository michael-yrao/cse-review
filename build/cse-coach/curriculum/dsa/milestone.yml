# DSA milestone curriculum — NeetCode 150, undated.
# The bootstrap projects these phases onto real dates from start_date using
# `pace_per_week`. Ordering is the standard NeetCode learning order (each phase
# leans on the prior). Tier = milestone (interview foundation, above the ROI line).
pillar: dsa
tier: milestone
roi: above_line
default_pace_per_week: 5   # DP phases drop to 3 (set per-phase below)

phases:
