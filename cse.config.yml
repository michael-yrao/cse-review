# Engine config, read by scripts/update_review_dates.py.
# Intervals and source root default to the standard values; the one non-default
# here is discovery_skip.
system_design:
  # three_weekly from the Jul 20 week (raised from twice_weekly on Jul 14, 2026).
  # Each lane owns a slot — never let two bid for the same one:
  #   ① tech fluency    → light midweek (ONE 15-min warmup): blind sprint vs a Recall Card
  #   ② blocks & probes → fuller midweek (BOTH warmups, ~30m): the note for whatever block
  #                       the last design hit cold, then probe questions
  #   ③ designs         → Sunday (45–60m): one staged session, full framework
  # Lane ② is why this is three and not two: "designs pull the blocks" needs somewhere to
  # PUT the cold-hit note, or it eats the tech-fluency rep and the pull model starves.
  # Midweek slots are WARMUP swaps — never the 45-min DSA active block. Cost lands on the
  # 🟢 Clean backlog. See docs/foundations/system_design/study_guide.md.
  cadence: three_weekly

solutions:
  roots: ["dsa/leetcode"]
  globs: ["*.py"]

# Problem numbers whose source file exists but should NOT be auto-added to the
# tracker (they re-enter when properly solved and logged).
discovery_skip: [76, 1216]   # 76 Minimum Window Substring — parked
                             # 1216 Valid Palindrome III — phase-gated; the Knowledge
                             #      Expansion Queue owns it. Without this, discovery
                             #      re-injects it into the review table as a 🔴 with no
                             #      attempt dates, restarting the +2-day churn that
                             #      phase-gating exists to stop.
